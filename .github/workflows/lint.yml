name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: .markdownlint-cli2.jsonc

  yaml:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .
          strict: false

  skills:
    name: Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill linter
        id: skill-lint
        run: |
          set +e
          total_fails=0
          log_dir="/tmp/skill-lint-logs"
          mkdir -p "$log_dir"

          {
            echo "## Skill Lint Results"
            echo ""
            echo "| Skill | Status | Rules Failed |"
            echo "|-------|--------|--------------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for skill_dir in skills/*/; do
            [[ -f "${skill_dir}SKILL.md" ]] || continue
            skill_name=$(basename "$skill_dir")
            log_file="${log_dir}/${skill_name}.txt"

            bash linting/lint-skill.sh "$skill_dir" > "$log_file" 2>&1
            exit_code=$?

            # Emit GitHub annotations for every FAIL and WARN line.
            # lint-skill.sh output format: "L01    FAIL   Some message here"
            grep -E '^L[0-9]+ +(FAIL|WARN) +' "$log_file" \
            | while IFS= read -r line; do
                rule=$(awk '{print $1}' <<< "$line")
                result=$(awk '{print $2}' <<< "$line")
                msg=$(awk '{for(i=3;i<=NF;i++) printf "%s%s",$i,(i<NF?" ":""); print ""}' <<< "$line")
                if [[ "$result" == "FAIL" ]]; then
                  echo "::error file=${skill_dir}SKILL.md,title=Skill lint ${rule}::${msg}"
                else
                  echo "::warning file=${skill_dir}SKILL.md,title=Skill lint ${rule}::${msg}"
                fi
              done

            if [[ $exit_code -ne 0 ]]; then
              ((total_fails++))
              failed_rules=$(grep ' FAIL ' "$log_file" | awk '{print $1}' | paste -sd ', ')
              printf '| `%s` | ❌ FAIL | %s |\n' "$skill_name" "$failed_rules" >> "$GITHUB_STEP_SUMMARY"
            else
              printf '| `%s` | ✅ PASS | |\n' "$skill_name" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          {
            echo ""
            if [[ $total_fails -eq 0 ]]; then
              echo "**All skills passed linting.** ✅"
            else
              echo "**${total_fails} skill(s) failed linting.** ❌"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $((total_fails > 0 ? 1 : 0))

      - name: Upload skill lint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-lint-logs
          path: /tmp/skill-lint-logs/
          retention-days: 14
