name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read plugin version
        id: plugin
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches plugin.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${{ steps.plugin.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "ERROR: tag $TAG does not match plugin.json version $EXPECTED"
            exit 1
          fi

      - name: Extract changelog notes
        id: notes
        run: |
          VERSION="${{ steps.plugin.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}

      - name: Trigger marketplace rebuild
        run: |
          curl -s -f -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/alisonaquinas/llm-skills/dispatches \
            -d "{\"event_type\":\"plugin-updated\",\"client_payload\":{\"repo\":\"${{ github.repository }}\",\"version\":\"${{ steps.plugin.outputs.version }}\"}}"
