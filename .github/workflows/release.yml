name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MARKETPLACE_DISPATCH_TOKEN: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Read plugin version
        id: plugin
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches plugin.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${{ steps.plugin.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "ERROR: tag $TAG does not match plugin.json version $EXPECTED"
            exit 1
          fi

      - name: Run repo test gate
        run: make test

      - name: Build skill ZIPs
        run: make all

      - name: Extract changelog notes
        id: notes
        run: |
          VERSION="${{ steps.plugin.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: built/*.zip

      - name: Trigger marketplace rebuild
        if: ${{ env.MARKETPLACE_DISPATCH_TOKEN != '' }}
        run: |
          curl --silent --show-error --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $MARKETPLACE_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/alisonaquinas/llm-skills/dispatches \
            -d "{\"event_type\":\"plugin-updated\",\"client_payload\":{\"repo\":\"${{ github.repository }}\",\"version\":\"${{ steps.plugin.outputs.version }}\"}}"

      - name: Skip marketplace rebuild
        if: ${{ env.MARKETPLACE_DISPATCH_TOKEN == '' }}
        run: echo "MARKETPLACE_DISPATCH_TOKEN is not configured; skipping marketplace rebuild dispatch."
